[build]
nixpacks = "php-8.2"

[phases.setup]
cmds = [
  "composer install --optimize-autoloader --no-dev",
  "npm install",
  "npm run build"
]

[phases.build]
cmds = [
  "mkdir -p storage bootstrap/cache",
  "chmod -R 775 storage bootstrap/cache"
]

[start]
# Use bash to run start.sh safely without DB verification
runImage = "ubuntu:22.04"
cmd = "bash start.sh"

[env]
# Prevent any health checks that might use mysql
DISABLE_HEALTHCHECK = "true"
